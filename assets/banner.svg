<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180">
  <style>
    @font-face {
      font-family: 'Orbitron';
      font-weight: 800;
      src: url('data:font/truetype;base64,') format('truetype');
    }
  </style>

  <rect width="760" height="180" fill="#0b0d12"/>

  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff85"/>
      <stop offset="100%" stop-color="#00b75e"/>
    </linearGradient>
  </defs>

  <!-- Q-pad mark -->
  <g transform="translate(40,28) scale(1.24)">
    <path d="M18,12 H72 Q88,12 88,28 V62 L74,76 H64 L82,94 H72 L60,82 H28 Q12,82 12,66 V28 Q12,12 28,12 Z"
          fill="none" stroke="url(#qg)" stroke-width="6" stroke-linejoin="miter"/>
    <g fill="url(#qg)">
      <rect x="44" y="28" width="12" height="38" rx="1.5"/>
      <rect x="31" y="41" width="38" height="12" rx="1.5"/>
    </g>
    <rect x="46" y="43" width="8" height="8" fill="#0b0d12"/>
  </g>

  <!-- wordmark: PADLIN white, Q neon green -->
  <text x="184" y="118"
        font-family="'Orbitron', sans-serif"
        font-size="82"
        font-weight="800"
        letter-spacing="3.3">
    <tspan fill="#e8ecf3">PADLIN</tspan><tspan fill="#00ff85">Q</tspan>
  </text>

  <!-- tagline -->
  <text x="187" y="152"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13"
        letter-spacing="2.8"
        fill="#9aa3b2">YOUR PHONE IS THE CONTROLLER</text>
</svg>
